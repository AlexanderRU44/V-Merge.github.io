<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Merge</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AlexanderRU44/TV.github.io/refs/heads/Icons/ICONS/android-chrome-192x192.png">
    
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: #0d1117; color: #c9d1d9; 
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; 
            overflow: hidden; 
        }

        .lang-panel { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn-lang { background: #21262d; border: 1px solid #30363d; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; }
        .btn-lang img { width: 24px; height: auto; border-radius: 2px; }
        .btn-lang.active { border-color: #58a6ff; background: #263951; }

        h2 { color: #f0f6fc; font-weight: 400; margin: 0 0 20px 0; text-align: center; flex-shrink: 0; }
        .container { display: flex; gap: 15px; max-width: 100%; flex-grow: 1; min-height: 0; }
        
        .column { 
            flex: 1; display: flex; flex-direction: column; 
            background: #161b22; padding: 15px; border-radius: 10px; 
            border: 1px solid #30363d; min-width: 0; 
        }

        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .col-header h3 { margin: 0; font-size: 16px; }

        textarea, #resultDisplay, .table-wrapper { 
            flex-grow: 1; width: 100%; padding: 10px; border: 1px solid #30363d; 
            border-radius: 6px; font-family: monospace; font-size: 13px; 
            background-color: #0d1117; color: #d1d5da; box-sizing: border-box; 
            overflow-y: auto; word-break: break-all; resize: none; 
        }

        .table-wrapper { padding: 0; } 
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            position: sticky; top: 0; background-color: #0d1117; 
            color: #8b949e; z-index: 10; text-align: left; 
            padding: 12px 8px; border-bottom: 2px solid #30363d; font-size: 12px;
        }
        td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #21262d; font-size: 12px; }
        
        tbody tr { cursor: pointer; transition: background 0.2s; }
        tbody tr:hover { background-color: #1f2937; }

        .Label { padding: 2px 6px; font-size: 10px; font-weight: 600; border-radius: 10px; text-transform: uppercase; border: 1px solid #444c56; }
        .type-vless { color: #58a6ff; border-color: #58a6ff; background: rgba(88,166,255,0.1); }
        .type-vmess { color: #a371f7; border-color: #a371f7; background: rgba(163,113,247,0.1); }
        .type-trojan { color: #ff7b72; border-color: #ff7b72; background: rgba(255,123,114,0.1); }
        .type-ss { color: #d29922; border-color: #d29922; background: rgba(210,153,34,0.1); }

        .line-highlight { background-color: rgba(247, 129, 102, 0.3); display: block; width: 100%; }

        .search-box { display: flex; gap: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .search-box input { flex-grow: 1; padding: 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; font-size: 13px; }
        
        .controls { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        button { padding: 10px 12px; cursor: pointer; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; font-weight: 600; transition: 0.2s; font-size: 12px; }
        
        button:disabled { opacity: 0.4; cursor: not-allowed !important; }

        .btn-merge { background: #238636; color: white; border: none; flex-grow: 1; }
        .btn-copy { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; flex-grow: 1; }
        .btn-download { background: #1f6feb; color: white; border: none; flex-grow: 1; }
        .btn-clear { background: #442d30; color: #f85149; border: 1px solid #6e2121; flex-grow: 1; }
        .btn-small-clear { padding: 4px 8px; background: #30363d; color: #8b949e; border: 1px solid #444c56; font-size: 10px; }

        #status { margin-top: 8px; font-size: 0.8em; font-family: monospace; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .visit-counter { opacity: 0.5; font-size: 10px; }
        mark { background-color: rgba(187, 128, 9, 0.8); color: #fff; border-radius: 2px; }

        @media (max-width: 1000px) {
            body { overflow-y: auto !important; height: auto; padding-top: 80px; }
            .container { flex-direction: column; height: auto; }
            .column { height: 450px; flex: none; margin-bottom: 15px; }
        }
    </style>
</head>
<body onload="initCounter()">

    <div class="lang-panel">
        <button class="btn-lang active" onclick="setLanguage('ru')" id="btn-ru"><img src="https://flagpedia.net/data/flags/w580/ru.webp" alt="RU"></button>
        <button class="btn-lang" onclick="setLanguage('en')" id="btn-en"><img src="https://flagpedia.net/data/flags/w580/gb.webp" alt="EN"></button>
    </div>

    <h2 id="mainTitle">V-Merge</h2>

    <div class="container">
        <div class="column">
            <div class="col-header">
                <h3 id="labelUrls">Ссылки на файлы</h3>
                <button id="btnSmallClear" class="btn-small-clear" onclick="document.getElementById('urls').value=''">✕ Очистить</button>
            </div>
            <textarea id="urls" placeholder="Вставьте ссылки..."></textarea>
            <div class="controls">
                <button class="btn-merge" id="btnMerge" onclick="processFiles()">Объединить и обработать</button>
            </div>
            <div id="status">
                <div>> <span id="statusText">Готов</span></div>
                <div class="visit-counter" id="visitCount">...</div>
            </div>
        </div>

        <div class="column">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск в тексте..." oninput="highlightText()">
                <button id="btnNext" class="btn-next" onclick="scrollToNext()">↓</button>
            </div>
            <div id="resultDisplay" contenteditable="true" spellcheck="false" oninput="updateButtons()"></div>
            <div class="controls">
                <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()" disabled>Копировать</button>
                <button class="btn-download" id="btnDownload" onclick="downloadTxt()" disabled>Скачать TXT</button>
                <button class="btn-clear" id="btnClear" onclick="clearAll()" disabled>Очистить всё</button>
            </div>
        </div>

        <div class="column">
            <div class="table-wrapper">
                <table id="configTable">
                    <thead>
                        <tr>
                            <th style="width:35px">#</th>
                            <th id="thType" style="width:85px">Тип</th>
                            <th id="thAddress">Адрес</th>
                            <th id="thPort" style="width:65px">Порт</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ru';
        let finalUniqueLines = [];
        let visitCountValue = 0;

        const translations = {
            ru: {
                mainTitle: "V-Merge", labelUrls: "Ссылки на файлы", urlsPlaceholder: "Вставьте ссылки...",
                btnMerge: "Объединить и обработать", btnSmallClear: "✕ Очистить",
                statusReady: "Готов", statusLoading: "Загрузка...", statusSuccess: "Уникальных: ",
                btnCopy: "Копировать", btnDownload: "Скачать TXT", btnClear: "Очистить всё",
                copied: "Скопировано!", searchPlaceholder: "Поиск в тексте...",
                thType: "Тип", thAddress: "Адрес", thPort: "Порт", visits: "Просмотры: "
            },
            en: {
                mainTitle: "V-Merge", labelUrls: "File Links", urlsPlaceholder: "Paste links...",
                btnMerge: "Merge & Process", btnSmallClear: "✕ Clear",
                statusReady: "Ready", statusLoading: "Loading...", statusSuccess: "Unique: ",
                btnCopy: "Copy", btnDownload: "Download TXT", btnClear: "Clear All",
                copied: "Copied!", searchPlaceholder: "Search...",
                thType: "Type", thAddress: "Address", thPort: "Port", visits: "Visits: "
            }
        };

        async function initCounter() {
            try {
                const res = await fetch(`https://countapi.xyz`);
                const data = await res.json();
                visitCountValue = data.value;
            } catch (e) {
                visitCountValue = localStorage.getItem('vmerge_local_hits') || 0;
                visitCountValue++;
                localStorage.setItem('vmerge_local_hits', visitCountValue);
            }
            updateCounterDisplay();
        }

        function updateCounterDisplay() {
            document.getElementById('visitCount').innerText = translations[currentLang].visits + visitCountValue;
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            
            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('labelUrls').innerText = t.labelUrls;
            document.getElementById('urls').placeholder = t.urlsPlaceholder;
            document.getElementById('btnMerge').innerText = t.btnMerge;
            document.getElementById('btnSmallClear').innerText = t.btnSmallClear;
            document.getElementById('btnDownload').innerText = t.btnDownload;
            document.getElementById('btnClear').innerText = t.btnClear;
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            document.getElementById('thType').innerText = t.thType;
            document.getElementById('thAddress').innerText = t.thAddress;
            document.getElementById('thPort').innerText = t.thPort;
            
            const copyBtn = document.getElementById('btnCopy');
            if (copyBtn.innerText !== translations['ru'].copied && copyBtn.innerText !== translations['en'].copied) {
                copyBtn.innerText = t.btnCopy;
            }

            const statusSpan = document.getElementById('statusText');
            statusSpan.innerText = finalUniqueLines.length > 0 ? t.statusSuccess + finalUniqueLines.length : t.statusReady;
            updateCounterDisplay();
        }

        // --- Остальная логика обработки (updateButtons, processFiles, renderTable, scrollToLine, copyToClipboard, downloadTxt, clearAll, highlightText) ---
        function updateButtons() {
            const hasData = document.getElementById('resultDisplay').innerText.trim().length > 0;
            document.getElementById('btnCopy').disabled = !hasData;
            document.getElementById('btnDownload').disabled = !hasData;
            document.getElementById('btnClear').disabled = !hasData;
        }

        async function processFiles() {
            const urls = document.getElementById('urls').value.split('\n').filter(u => u.trim());
            if (!urls.length) return;
            document.getElementById('statusText').innerText = translations[currentLang].statusLoading;
            let combined = [];
            for (let url of urls) {
                try {
                    const res = await fetch(url.trim());
                    const text = await res.text();
                    text.split('\n').forEach(line => {
                        let clean = line.trim();
                        if (!clean || clean.startsWith('#')) return;
                        if (clean.includes('#')) clean = clean.split('#').trim();
                        if (clean) combined.push(clean);
                    });
                } catch (e) {}
            }
            finalUniqueLines = [...new Set(combined)];
            document.getElementById('resultDisplay').innerText = finalUniqueLines.join('\n');
            document.getElementById('statusText').innerText = translations[currentLang].statusSuccess + finalUniqueLines.length;
            renderTable(finalUniqueLines);
            updateButtons();
        }

        function renderTable(configs) {
            const tbody = document.querySelector('#configTable tbody');
            tbody.innerHTML = '';
            configs.forEach((line, index) => {
                let type = "other", addr = "-", port = "-";
                try {
                    if (line.includes('://')) {
                        const p = line.split('://');
                        type = p.toLowerCase();
                        const h = p.split('@').pop().split(/[/?#]/).split(':');
                        addr = h; port = h || "-";
                    }
                } catch(e) {}
                tbody.insertAdjacentHTML('beforeend', `<tr onclick="scrollToLine(${index})">
                    <td>${index + 1}</td>
                    <td><span class="Label type-${type}">${type}</span></td>
                    <td><span class="address-text">${addr}</span></td>
                    <td>${port}</td>
                </tr>`);
            });
        }

        function scrollToLine(index) {
            const display = document.getElementById('resultDisplay');
            display.innerHTML = finalUniqueLines.map((l, i) => i === index ? `<span id="target-line" class="line-highlight">${l}</span>` : l).join('\n');
            const target = document.getElementById('target-line');
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function copyToClipboard() {
            const btn = document.getElementById('btnCopy');
            navigator.clipboard.writeText(document.getElementById('resultDisplay').innerText).then(() => {
                btn.innerText = translations[currentLang].copied;
                setTimeout(() => btn.innerText = translations[currentLang].btnCopy, 2000);
            });
        }

        function downloadTxt() {
            const content = document.getElementById('resultDisplay').innerText.trim();
            if (!content) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([content], {type: 'text/plain'}));
            a.download = 'configs.txt';
            a.click();
        }

        function clearAll() {
            document.getElementById('resultDisplay').innerText = '';
            document.querySelector('#configTable tbody').innerHTML = '';
            document.getElementById('statusText').innerText = translations[currentLang].statusReady;
            finalUniqueLines = [];
            updateButtons();
        }

        function highlightText() {
            const s = document.getElementById('searchInput').value;
            const d = document.getElementById('resultDisplay');
            if (!s) { d.innerText = finalUniqueLines.join('\n'); return; }
            d.innerHTML = finalUniqueLines.join('\n').replace(new RegExp(`(${s})`, 'gi'), '<mark>$1</mark>');
        }
        function scrollToNext() {
            const m = document.querySelector('mark');
            if (m) m.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
