<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Merge</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AlexanderRU44/TV.github.io/refs/heads/Icons/ICONS/android-chrome-192x192.png">
    
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 20px; 
            background-color: #0d1117; color: #c9d1d9; 
        }

        .lang-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .btn-lang {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .btn-lang img {
            width: 24px;
            height: auto;
            border-radius: 2px;
            display: block;
            filter: grayscale(40%);
        }
        .btn-lang:hover { background: #30363d; }
        .btn-lang.active { 
            border-color: #58a6ff; 
            background: #263951;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }
        .btn-lang.active img { filter: grayscale(0%); }

        h2 { color: #f0f6fc; font-weight: 400; margin-bottom: 30px; text-align: center; }
        
        .container { 
            display: flex; 
            gap: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
            height: calc(100vh - 140px); 
        }
        
        .column { 
            flex: 1; display: flex; flex-direction: column; 
            background: #161b22; padding: 20px; border-radius: 10px; 
            border: 1px solid #30363d; box-shadow: 0 4px 20px rgba(0,0,0,0.3); overflow: hidden; 
        }

        textarea, #resultDisplay { 
            flex-grow: 1; width: 100%; padding: 15px; border: 1px solid #30363d; 
            border-radius: 6px; font-family: monospace; font-size: 13px; 
            background-color: #0d1117; color: #d1d5da; box-sizing: border-box; 
            overflow-y: auto; 
            resize: none; /* Запрет растягивания */
        }
        #resultDisplay { white-space: pre-wrap; outline: none; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input { 
            flex-grow: 1; padding: 10px; background: #0d1117; 
            border: 1px solid #30363d; border-radius: 6px; color: white; 
        }
        
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { 
            padding: 10px 15px; cursor: pointer; border: 1px solid rgba(240,246,252,0.1); 
            border-radius: 6px; font-weight: 600; transition: 0.2s; 
        }
        
        .btn-merge { background: #238636; color: white; border: none; flex-grow: 1; }
        .btn-copy { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; flex-grow: 1; }
        .btn-download { background: #1f6feb; color: white; border: none; flex-grow: 1; }
        .btn-clear { background: #442d30; color: #f85149; border: 1px solid #6e2121; flex-grow: 1; }
        .btn-next { background: #1f6feb; color: white; border: none; }

        mark { background-color: rgba(187, 128, 9, 0.6); color: #fff; padding: 2px 0; border-radius: 2px; }
        mark.current { background-color: #f78166; box-shadow: 0 0 10px #f78166; } 
        #status { margin-top: 10px; font-size: 0.85em; font-family: monospace; color: #8b949e; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            body { padding: 10px; padding-top: 70px; }
            .lang-panel { top: 15px; right: 15px; }
            h2 { margin-top: 0; font-size: 1.5rem; text-align: center; width: 100%; position: relative; }
            .container { flex-direction: column; height: auto; gap: 15px; }
            .column { height: auto; min-height: 350px; padding: 15px; }
            textarea, #resultDisplay { height: 280px; flex-grow: 0; }
            button { font-size: 13px; padding: 12px 10px; }
        }
    </style>
</head>
<body>

    <div class="lang-panel">
        <button class="btn-lang active" onclick="setLanguage('ru')" id="btn-ru" title="Русский">
            <img src="https://flagpedia.net/data/flags/w580/ru.webp" alt="RU">
        </button>
        <button class="btn-lang" onclick="setLanguage('en')" id="btn-en" title="English">
            <img src="https://flagpedia.net/data/flags/w580/gb.webp" alt="EN">
        </button>
    </div>

    <h2 id="mainTitle">V-Merge</h2>

    <div class="container">
        <div class="column">
            <h3 id="labelUrls" style="margin-top:0">Ссылки на файлы</h3>
            <textarea id="urls" placeholder="Вставьте ссылки (каждая с новой строки)..."></textarea>
            <div class="controls">
                <button class="btn-merge" id="btnMerge" onclick="processFiles()">Объединить и очистить</button>
            </div>
            <div id="status">> <span id="statusText">Готов</span></div>
        </div>

        <div class="column">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск в результате..." oninput="highlightText()">
                <button class="btn-next" id="btnNext" onclick="scrollToNext()">Далее →</button>
            </div>
            <div id="resultDisplay" contenteditable="true" spellcheck="false"></div>
            <div class="controls">
                <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">Копировать</button>
                <button class="btn-download" id="btnDownload" onclick="downloadTxt()">Скачать .TXT</button>
                <button class="btn-clear" id="btnClear" onclick="clearAll()">Очистить всё</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ru';
        let rawContent = ""; 
        let currentMarkIndex = -1;

        const translations = {
            ru: {
                labelUrls: "Ссылки на файлы",
                urlsPlaceholder: "Вставьте ссылки (каждая с новой строки)...",
                btnMerge: "Объединить и очистить",
                statusReady: "Готов",
                statusLoading: "Загрузка данных...",
                statusErrorUrls: "Ошибка: введите ссылки",
                statusErrorFetch: "Ошибка загрузки данных",
                statusSuccess: "Готово! Уникальных строк: ",
                searchPlaceholder: "Поиск в результате...",
                btnNext: "Далее →",
                btnCopy: "Копировать",
                btnDownload: "Скачать .TXT",
                btnClear: "Очистить всё",
                copied: "Скопировано!"
            },
            en: {
                labelUrls: "File Links",
                urlsPlaceholder: "Paste links (one per line)...",
                btnMerge: "Merge and Clean",
                statusReady: "Ready",
                statusLoading: "Loading data...",
                statusErrorUrls: "Error: enter links",
                statusErrorFetch: "Error loading data",
                statusSuccess: "Done! Unique rows: ",
                searchPlaceholder: "Search in result...",
                btnNext: "Next →",
                btnCopy: "Copy",
                btnDownload: "Download .TXT",
                btnClear: "Clear All",
                copied: "Copied!"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('.btn-lang').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            document.getElementById('labelUrls').innerText = t.labelUrls;
            document.getElementById('urls').placeholder = t.urlsPlaceholder;
            document.getElementById('btnMerge').innerText = t.btnMerge;
            document.getElementById('statusText').innerText = t.statusReady;
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            document.getElementById('btnNext').innerText = t.btnNext;
            document.getElementById('btnCopy').innerText = t.btnCopy;
            document.getElementById('btnDownload').innerText = t.btnDownload;
            document.getElementById('btnClear').innerText = t.btnClear;
            document.documentElement.lang = lang;
        }

        async function processFiles() {
            const urlsArea = document.getElementById('urls');
            const status = document.getElementById('statusText');
            const resultDisplay = document.getElementById('resultDisplay');
            const urls = urlsArea.value.split('\n').map(u => u.trim()).filter(u => u);

            if (urls.length === 0) {
                status.innerText = translations[currentLang].statusErrorUrls;
                return;
            }

            status.innerText = translations[currentLang].statusLoading;
            let combinedText = "";

            try {
                for (const url of urls) {
                    const response = await fetch(url);
                    if (response.ok) {
                        combinedText += await response.text() + "\n";
                    }
                }
                const uniqueLines = [...new Set(combinedText.split('\n').map(l => l.trim()).filter(l => l))];
                rawContent = uniqueLines.join('\n');
                resultDisplay.innerText = rawContent;
                status.innerText = translations[currentLang].statusSuccess + uniqueLines.length;
            } catch (e) {
                status.innerText = translations[currentLang].statusErrorFetch;
            }
        }

        function highlightText() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const display = document.getElementById('resultDisplay');
            if (!query) { display.innerText = rawContent; return; }
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            display.innerHTML = rawContent.replace(regex, '<mark>$1</mark>');
            currentMarkIndex = -1;
        }

        function scrollToNext() {
            const marks = document.querySelectorAll('mark');
            if (marks.length === 0) return;
            marks.forEach(m => m.classList.remove('current'));
            currentMarkIndex = (currentMarkIndex + 1) % marks.length;
            const target = marks[currentMarkIndex];
            target.classList.add('current');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function copyToClipboard() {
            const text = document.getElementById('resultDisplay').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('btnCopy');
                const oldText = btn.innerText;
                btn.innerText = translations[currentLang].copied;
                setTimeout(() => btn.innerText = oldText, 2000);
            });
        }

        function downloadTxt() {
            const text = document.getElementById('resultDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'merged_result.txt';
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        function clearAll() {
            document.getElementById('urls').value = '';
            document.getElementById('resultDisplay').innerText = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('statusText').innerText = translations[currentLang].statusReady;
            rawContent = "";
        }
    </script>
</body>
</html>
